




name: ML Pipeline CI

on:
  push:
    paths:
      - "Complete_MLOps_Bootcamp_With_10_End_To_End_ML_Projects/7.Airflow_astro/**"
  pull_request:
    paths:
      - "Complete_MLOps_Bootcamp_With_10_End_To_End_ML_Projects/7.Airflow_astro/**"

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # -------------------------
      # Python setup
      # -------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # -------------------------
      # Install dependencies
      # -------------------------
      - name: Install dependencies
        run: |
          cd "Complete_MLOps_Bootcamp_With_10_End_To_End_ML_Projects/7.Airflow_astro"
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # -------------------------
      # Run your pipeline
      # -------------------------
      - name: Run training
        run: |
          cd "Complete_MLOps_Bootcamp_With_10_End_To_End_ML_Projects/7.Airflow_astro/dags"
          python exampledag.py

      # -------------------------
      # Build Docker image (CI check only)
      # -------------------------
      - name: Build Docker image
        run: |
          docker build -t ml-pipeline-test "./Complete_MLOps_Bootcamp_With_10_End_To_End_ML_Projects/7.Airflow_astro"
          

      - name: Run Docker container
        run: docker run ml-pipeline-test






