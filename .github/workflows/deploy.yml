

name: ML Pipeline CI

on:
  push:
    paths:
      - "Complete_MLOps_Bootcamp_With_10_End_To_End_ML_Projects/project/**"
  pull_request:
    paths:
      - "Complete_MLOps_Bootcamp_With_10_End_To_End_ML_Projects/project/**"

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd "Complete_MLOps_Bootcamp_With_10_End_To_End_ML_Projects/project"
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests
        run: |
          cd "Complete_MLOps_Bootcamp_With_10_End_To_End_ML_Projects/project"
          python test_app.py

      - name: Build Docker image
        run: |
          docker build -t ml-pipeline-test "./Complete_MLOps_Bootcamp_With_10_End_To_End_ML_Projects/project"

      - name: Run Docker container
        run: docker run ml-pipeline-test






